name: CI Pipeline

on:
  push:
    branches: [main, develop, development]
  pull_request:
    branches: [main, develop, development]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "eclipse-temurin"
          cache: maven

      - name: Build all microservices
        run: |
          echo "Building all microservices with JDK 21..."
          for pom in $(find . -maxdepth 2 -name "pom.xml" -not -path "./pom.xml"); do
            dir=$(dirname "$pom")
            echo "--- Building: $dir ---"
            cd "$dir" && mvn clean package -DskipTests && cd - || exit 1
          done

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          for pom in $(find ./services -maxdepth 1 -name "*/pom.xml"); do
            dir=$(dirname "$pom")
            echo "--- Testing: $dir ---"
            cd "$dir" && mvn test || true
            cd - > /dev/null
          done

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jar-files
          path: "services/*/target/*.jar"
          retention-days: 7

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "eclipse-temurin"
          cache: maven

      - name: Compile all modules
        run: |
          echo "Compiling all modules..."
          for pom in $(find . -maxdepth 2 -name "pom.xml" -not -path "./pom.xml"); do
            dir=$(dirname "$pom")
            echo "--- Compiling: $dir ---"
            cd "$dir" && mvn compile && cd - || exit 1
          done
