spring.application.name=ticket-service

# ═════════════════════════════════════════════════════════
# Server Configuration
# ═════════════════════════════════════════════════════════
server.port=8084
server.servlet.context-path=/
management.server.port=8084

# ═════════════════════════════════════════════════════════
# Database Configuration (MySQL)
# ═════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═════════════════════════════════════════════════════════
# RabbitMQ Configuration
# ═════════════════════════════════════════════════════════
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

order.messaging.enabled=true
order.messaging.exchange=order.exchange
order.messaging.routing-key=order.paid
order.messaging.queue=order.paid.ticket.queue

# ═════════════════════════════════════════════════════════
# JPA Configuration
# ═════════════════════════════════════════════════════════
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ═════════════════════════════════════════════════════════
# Logging
# ═════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.fit.iuh=DEBUG
