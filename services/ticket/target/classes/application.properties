spring.application.name=ticket-service

# ═════════════════════════════════════════════════════════
# Server Configuration
# ═════════════════════════════════════════════════════════
server.port=8084
server.servlet.context-path=/
management.server.port=8084

# ═════════════════════════════════════════════════════════
# Database Configuration (MySQL)
# ═════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://mysql:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═════════════════════════════════════════════════════════
# JPA Configuration
# ═════════════════════════════════════════════════════════
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ═════════════════════════════════════════════════════════
# Logging
# ═════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.fit.iuh=DEBUG
