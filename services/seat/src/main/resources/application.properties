spring.application.name=seat-service

# ═════════════════════════════════════════════════════════
# Server Configuration
# ═════════════════════════════════════════════════════════
server.port=8086
server.servlet.context-path=/
management.server.port=8086

# ═════════════════════════════════════════════════════════
# Database Configuration (MySQL)
# ═════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://mysql:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═════════════════════════════════════════════════════════
# JPA Configuration
# ═════════════════════════════════════════════════════════
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ═════════════════════════════════════════════════════════
# Redis Configuration (Caching)
# ═════════════════════════════════════════════════════════
spring.redis.host=redis
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=60000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ═════════════════════════════════════════════════════════
# Logging
# ═════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.fit.iuh=DEBUG
