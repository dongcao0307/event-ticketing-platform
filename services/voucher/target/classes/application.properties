spring.application.name=voucher-service

# Server Configuration
server.port=8088
server.servlet.context-path=/
management.server.port=8088

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://mysql:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&allowLoadPublicKeyForFile=true&cacheServerConfiguration=true&defaultAuthenticationPlugin=com.mysql.cj.jdbc.authentication.MysqlCryptoPasswordPlugin
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# Redis Configuration (Caching)
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=60000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# Logging
logging.level.root=INFO
logging.level.fit.iuh=DEBUG

