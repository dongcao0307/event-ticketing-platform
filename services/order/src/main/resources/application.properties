spring.application.name=order-service

# ═════════════════════════════════════════════════════════
# Server Configuration
# ═════════════════════════════════════════════════════════
server.port=8090
server.servlet.context-path=/
management.server.port=8090

# ═════════════════════════════════════════════════════════
# Database Configuration (MySQL)
# ═════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═════════════════════════════════════════════════════════
# JPA Configuration
# ═════════════════════════════════════════════════════════
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ═════════════════════════════════════════════════════════
# Redis Configuration
# ═════════════════════════════════════════════════════════
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=0

# ═════════════════════════════════════════════════════════
# RabbitMQ Configuration
# ═════════════════════════════════════════════════════════
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Consume payment status changed events from payment-service
payment.messaging.enabled=true
payment.messaging.exchange=payment.exchange
payment.messaging.routing-key=payment.status.changed
payment.messaging.queue=payment.status.changed.queue

# Publish order paid events for downstream services (ticket-service)
order.messaging.enabled=true
order.messaging.exchange=order.exchange
order.messaging.routing-key=order.paid
order.messaging.queue=order.paid.ticket.queue

# Business config
order.expire.minutes=17

# ═════════════════════════════════════════════════════════
# Logging
# ═════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.fit.iuh=DEBUG
