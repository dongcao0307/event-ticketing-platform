spring.application.name=payment-service
spring.config.import=optional:classpath:config/vietqr-secrets.properties,optional:classpath:config/vnpay-secrets.properties

# ═════════════════════════════════════════════════════════
# Server Configuration
# ═════════════════════════════════════════════════════════
server.port=8085
server.servlet.context-path=/
management.server.port=8085

# ═════════════════════════════════════════════════════════
# Database Configuration (MySQL)
# ═════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═════════════════════════════════════════════════════════
# JPA Configuration
# ═════════════════════════════════════════════════════════
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ═════════════════════════════════════════════════════════
# Logging
# ═════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.fit.iuh=DEBUG

# ═════════════════════════════════════════════════════════
# VietQR Sandbox Configuration
# ═════════════════════════════════════════════════════════
payment.vietqr.provider-name=VietQR Sandbox
payment.vietqr.sandbox-enabled=true
payment.vietqr.qr-base-url=https://img.vietqr.io/image
payment.vietqr.qr-expired-minutes=15
payment.vietqr.fee-rate-percent=1.5
payment.vietqr.signature-required=true

# ═════════════════════════════════════════════════════════
# VNPay Sandbox Configuration
# ═════════════════════════════════════════════════════════
payment.vnpay.provider-name=VNPay Sandbox
payment.vnpay.sandbox-enabled=true
payment.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
payment.vnpay.return-url=http://localhost:3000/payment/vnpay/return
payment.vnpay.expire-minutes=15
payment.vnpay.fee-rate-percent=1.5
payment.vnpay.version=2.1.0
payment.vnpay.command=pay
payment.vnpay.curr-code=VND
payment.vnpay.locale=vn

# ═════════════════════════════════════════════════════════
# RabbitMQ Message Publishing (prepared, disabled by default)
# ═════════════════════════════════════════════════════════
payment.messaging.enabled=false
payment.messaging.exchange=payment.exchange
payment.messaging.routing-key=payment.status.changed
