spring.application.name=payment-service
spring.config.import=optional:classpath:config/vietqr-secrets.properties,optional:classpath:config/vnpay-secrets.properties,optional:classpath:config/momo-secrets.properties

# ═════════════════════════════════════════════════════════
# Server Configuration
# ═════════════════════════════════════════════════════════
server.port=8085
server.servlet.context-path=/
management.server.port=8085

# ═════════════════════════════════════════════════════════
# Database Configuration (MySQL)
# ═════════════════════════════════════════════════════════
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ticketbox}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ═════════════════════════════════════════════════════════
# JPA Configuration
# ═════════════════════════════════════════════════════════
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ═════════════════════════════════════════════════════════
# Logging
# ═════════════════════════════════════════════════════════
logging.level.root=INFO
logging.level.fit.iuh=DEBUG

# ═════════════════════════════════════════════════════════
# VietQR Sandbox Configuration
# ═════════════════════════════════════════════════════════
payment.vietqr.provider-name=VietQR Sandbox
payment.vietqr.sandbox-enabled=true
payment.vietqr.qr-base-url=https://img.vietqr.io/image
payment.vietqr.qr-expired-minutes=15
payment.vietqr.fee-rate-percent=1.5
payment.vietqr.signature-required=true

# ═════════════════════════════════════════════════════════
# VNPay Sandbox Configuration
# ═════════════════════════════════════════════════════════
payment.vnpay.provider-name=VNPay Sandbox
payment.vnpay.sandbox-enabled=true
payment.vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
payment.vnpay.return-url=${PAYMENT_VNPAY_RETURN_URL:http://localhost:3000/payment/vnpay/return}
payment.vnpay.expire-minutes=15
payment.vnpay.fee-rate-percent=1.5
payment.vnpay.version=2.1.0
payment.vnpay.command=pay
payment.vnpay.curr-code=VND
payment.vnpay.locale=vn

# ═════════════════════════════════════════════════════════
# MoMo Sandbox Configuration
# ═════════════════════════════════════════════════════════
payment.momo.provider-name=MoMo Sandbox
payment.momo.sandbox-enabled=true
payment.momo.create-endpoint=https://test-payment.momo.vn/v2/gateway/api/create
payment.momo.return-url=${PAYMENT_MOMO_RETURN_URL:http://localhost:3000/event/1/payment}
payment.momo.ipn-url=${PAYMENT_MOMO_IPN_URL:http://localhost:8085/api/payment/momo/ipn}
payment.momo.expire-minutes=15
payment.momo.fee-rate-percent=1.5
payment.momo.request-type=payWithATM
payment.momo.lang=vi
payment.momo.auto-capture=true
payment.momo.signature-required=true

# ═════════════════════════════════════════════════════════
# RabbitMQ Message Publishing (prepared, disabled by default)
# ═════════════════════════════════════════════════════════
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

payment.messaging.enabled=true
payment.messaging.exchange=payment.exchange
payment.messaging.routing-key=payment.status.changed
