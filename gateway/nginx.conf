# ═════════════════════════════════════════════════════════
# TicketBox - API Gateway (Nginx Configuration)
# Rate Limiter: 5 requests per minute (1 req per 12 seconds)
# ═════════════════════════════════════════════════════════

# Rate Limiting Configuration (5 req/min per IP)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/m;
limit_req_status 429;

# Request body size limits
client_max_body_size 10M;

# Upstream Service Definitions
upstream identity_backend {
    server identity-service:8081;
    keepalive 32;
}

upstream event_backend {
    server event-service:8082;
    keepalive 32;
}

upstream booking_backend {
    server booking-service:8083;
    keepalive 32;
}

# Main Server Block
server {
    listen 80 default_server;
    server_name _;

    # Client body size
    client_max_body_size 10M;

    # Request timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Access & Error Logs
    access_log /var/log/nginx/access.log combined;
    error_log /var/log/nginx/error.log warn;

    # ═════════════════════════════════════════════════════════
    # Health Check Endpoint
    # ═════════════════════════════════════════════════════════
    location = / {
        access_log off;
        default_type text/plain;
        return 200 'TicketBox API Gateway is running

Service Routing:
- /auth/*     → Identity Service (8081)
- /events/*   → Event Service (8082)
- /bookings/* → Booking Service (8083)

Status: OK
';
    }

    # ═════════════════════════════════════════════════════════
    # Identity Service Routes (/auth/*)
    # ═════════════════════════════════════════════════════════
    location /auth/ {
        # Rate Limiting: 5 requests per minute (burst up to 10)
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://identity_backend/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # CORS Headers (Optional)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering off;
    }

    # Handle OPTIONS requests for CORS
    location ~ /auth/(.*)$ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            return 204;
        }
    }

    # ═════════════════════════════════════════════════════════
    # Event Service Routes (/events/*)
    # ═════════════════════════════════════════════════════════
    location ~ ^/(events|organizer)/ {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://event_backend; 
        proxy_http_version 1.1;

        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-User-Id' always;

        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-User-Id' always;
            add_header 'Access-Control-Max-Age' 1728000;
            return 204;
        }
    }

    # Handle OPTIONS requests for CORS
    location ~ /events/(.*)$ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            return 204;
        }
    }

    # ═════════════════════════════════════════════════════════
    # Booking Service Routes (/bookings/*)
    # ═════════════════════════════════════════════════════════
    location /bookings/ {
        # Rate Limiting: 5 requests per minute (burst up to 10)
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://booking_backend/;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffering
        proxy_buffering off;
    }

    # Handle OPTIONS requests for CORS
    location ~ /bookings/(.*)$ {
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            return 204;
        }
    }

    # ═════════════════════════════════════════════════════════
    # Error Pages
    # ═════════════════════════════════════════════════════════
    error_page 502 503 504 @unavailable;

    location @unavailable {
        default_type application/json;
        return 503 '{"error":"Service Unavailable","message":"One or more backend services are temporarily unavailable"}';
    }

    # ═════════════════════════════════════════════════════════
    # Status Endpoint (for monitoring)
    # ═════════════════════════════════════════════════════════
    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}