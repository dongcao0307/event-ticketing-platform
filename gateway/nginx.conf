# ═════════════════════════════════════════════════════════
# TicketBox - API Gateway (Nginx Configuration)
# ═════════════════════════════════════════════════════════

# Rate Limiting - 60 requests per minute per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
limit_req_status 429;

client_max_body_size 10M;

# ─── Upstream Definitions ───────────────────────────────
upstream identity_backend {
    server identity-service:8087;
    keepalive 32;
}

upstream event_backend {
    server event-service:8082;
    keepalive 32;
}

# ─── CORS Helper ────────────────────────────────────────
map $request_method $cors_method {
    default     "allowed";
    OPTIONS     "preflight";
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10M;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ─── Health Check ──────────────────────────────────
    location = / {
        access_log off;
        default_type text/plain;
        return 200 'TicketBox API Gateway OK\n- /auth/* → identity-service:8087\n- /events/* → event-service:8082\n';
    }

    # ─── CORS Preflight (global) ───────────────────────
    location / {
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Authorization, X-Requested-With' always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            return 204;
        }
        return 404;
    }

    # ═════════════════════════════════════════════════════════
    # Event Service Routes (/events/*)
    # ═════════════════════════════════════════════════════════
    location ~ ^/(events|organizer)/ {
        limit_req zone=api_limit burst=10 nodelay;
        
        proxy_pass http://event_backend; 
        proxy_http_version 1.1;

        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection "";

        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-User-Id' always;

        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-User-Id' always;
            add_header 'Access-Control-Max-Age' 1728000;
            return 204;
        }
    # ─── Identity Service (/auth/*) ────────────────────
    location /auth/ {
        limit_req zone=api_limit burst=30 nodelay;

        # Keep the full path (no trailing slash = no stripping)
        proxy_pass http://identity_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        add_header Access-Control-Allow-Origin  '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;

        proxy_buffering off;
    }

    # ─── Event Service (/events/*) ─────────────────────
    location /events/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass http://event_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        add_header Access-Control-Allow-Origin  '*' always;
        add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header Access-Control-Allow-Headers 'Content-Type, Authorization' always;

        proxy_buffering off;
    }

    # ─── Error Pages ───────────────────────────────────
    error_page 502 503 504 @unavailable;
    location @unavailable {
        default_type application/json;
        return 503 '{"error":"Service Unavailable","message":"Backend service is temporarily unavailable"}';
    }
}
