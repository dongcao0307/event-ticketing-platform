version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════
  # DATABASE
  # ═══════════════════════════════════════════════════════════
  mysql:
    image: mysql:8.0
    container_name: ticketbox-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ticketbox
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ticketbox-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════
  # API GATEWAY
  # ═══════════════════════════════════════════════════════════
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ticketbox-gateway
    depends_on:
      - identity-service
      - event-service
    ports:
      - "8080:80"
    networks:
      - ticketbox-net
    restart: on-failure

  # ═══════════════════════════════════════════════════════════
  # IDENTITY SERVICE (Authentication + JWT)
  # ═══════════════════════════════════════════════════════════
  identity-service:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
    container_name: ticketbox-identity
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8087:8087"
    networks:
      - ticketbox-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_ACCESS_TOKEN_EXPIRATION: 900000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    restart: on-failure

  # ═══════════════════════════════════════════════════════════
  # EVENT SERVICE (Search + Details)
  # ═══════════════════════════════════════════════════════════
  event-service:
    build:
      context: ./services/event
      dockerfile: Dockerfile
    container_name: ticketbox-event
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - ticketbox-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ticketbox?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    restart: on-failure

  # ═══════════════════════════════════════════════════════════
  # WEB APPLICATION (React + Vite)
  # ═══════════════════════════════════════════════════════════
  web-app:
    build:
      context: ./web/web-app
      dockerfile: Dockerfile
    container_name: ticketbox-web
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    networks:
      - ticketbox-net
    restart: on-failure

volumes:
  mysql_data:

networks:
  ticketbox-net:
    driver: bridge
